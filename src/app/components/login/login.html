<div class="login-container">
  <div class="login-card">
    <div class="login-logo">
      <img src="assets/img/flor.jpeg" alt="Logo" style="width:85px; border-radius:50%; border:3px solid #B8EABC;">
      <h2>Cuerpo y Alma</h2>
    </div>
    <h3>Iniciar Sesión</h3>
    <div class="error-msg" *ngIf="error">⚠️ {{ error }}</div>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" [(ngModel)]="correo" placeholder="correo@ejemplo.com" (keyup.enter)="iniciarSesion()">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" [(ngModel)]="password" placeholder="••••••••" (keyup.enter)="iniciarSesion()">
    </div>
    <button class="btn-login" (click)="iniciarSesion()" [disabled]="cargando">
      {{ cargando ? 'Verificando...' : 'Ingresar' }}
    </button>
    <div class="links">
      <p>¿No tienes cuenta? <a routerLink="/registro">Regístrate aquí</a></p>
      <p><a routerLink="/">← Volver al inicio</a></p>
    </div>
  </div>
</div>
