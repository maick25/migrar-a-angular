<section class="pqr" id="pqr">
  <h2>Cuestionario de satisfacción</h2>
  <p>Cuentame si tienes una peticion, queja o reclamo. Tu opinión es importante para nosotros.</p>

  <form class="formulario-pqr" (submit)="enviarFormulario($event)">
    <label for="nombre">Nombre completo</label>
    <input type="text" id="nombre" [(ngModel)]="nombre" name="nombre" placeholder="Escribe tu nombre" required>

    <label for="correo">Correo electrónico</label>
    <input type="email" id="correo" [(ngModel)]="correo" name="correo" placeholder="ejemplo@correo.com" required>

    <label for="tipo">Asunto o Motivo</label>
    <select id="tipo" [(ngModel)]="tipo" name="tipo" required>
      <option value="">Selecciona una opción</option>
      <option value="peticion">Petición</option>
      <option value="queja">Queja</option>
      <option value="reclamo">Reclamo</option>
    </select>

    <label for="mensaje">Cuentanos...</label>
    <textarea id="mensaje" [(ngModel)]="mensaje" name="mensaje" rows="5" placeholder="Escribe aquí tu mensaje..." required></textarea>

    <button type="submit">Enviar</button>
  </form>

  <p id="respuestaPQR">{{ respuesta }}</p>
</section>
