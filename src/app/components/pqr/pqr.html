<section class="pqr" id="pqr">
  <h2>Cuestionario de satisfacción</h2>
  <p>Cuéntame si tienes una petición, queja o reclamo. Tu opinión es importante para nosotros.</p>

  <!-- Confirmación -->
  <div class="pqr-confirmacion" *ngIf="exito">
    <div class="check">✅</div>
    <p>{{ respuesta }}</p>
    <button class="btn-nueva" (click)="nuevaConsulta()">Enviar otra consulta</button>
  </div>

  <!-- Formulario -->
  <form class="formulario-pqr" (submit)="enviarFormulario($event)" *ngIf="!exito">
    <label for="nombre">Nombre completo</label>
    <input type="text" id="nombre" [(ngModel)]="nombre" name="nombre" placeholder="Escribe tu nombre" required>

    <label for="correo">Correo electrónico</label>
    <input type="email" id="correo" [(ngModel)]="correo" name="correo" placeholder="ejemplo@correo.com" required>

    <label for="tipo">Asunto o Motivo</label>
    <select id="tipo" [(ngModel)]="tipo" name="tipo" required>
      <option value="">Selecciona una opción</option>
      <option value="peticion">Petición</option>
      <option value="queja">Queja</option>
      <option value="reclamo">Reclamo</option>
    </select>

    <label for="mensaje">Cuéntanos...</label>
    <textarea id="mensaje" [(ngModel)]="mensaje" name="mensaje" rows="5" placeholder="Escribe aquí tu mensaje..." required></textarea>

    <button type="submit" [disabled]="enviando">
      {{ enviando ? 'Enviando...' : 'Enviar' }}
    </button>
  </form>

  <p class="respuesta-error" *ngIf="respuesta && !exito">{{ respuesta }}</p>
</section>
